name: 每日代码提交行数统计

on:
  schedule:
    # 每天北京时间 00:05 (UTC 时间 16:05) 自动运行一次
    - cron: '5 16 * * *'
  workflow_dispatch: # 允许在 GitHub 后台手动点击按钮触发

permissions:
  contents: write

jobs:
  calculate-and-update:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出主分支源码（以便获取 Python 脚本）
      - name: 检出主分支源码
        uses: actions/checkout@v4

      # 2. 设置 Python 3.10 环境
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装依赖项
      - name: 安装 Python 依赖项
        run: |
          python -m pip install --upgrade pip
          pip install pyjwt cryptography requests

      # 4. 使用 GitHub App 生成临时访问 Token
      - name: 生成 GitHub App Token
        id: get_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: emu-stu
          permission-contents: write

      # 5. 下载历史数据 stats.json
      - name: 下载历史数据 stats.json
        run: |
          curl -s -f "https://raw.githubusercontent.com/${{ github.repository }}/stats-data/stats.json" -o stats.json || echo "[]" > stats.json

      # 6. 运行 Python 统计脚本
      - name: 运行统计脚本并更新 stats.json
        env:
          GITHUB_TOKEN: ${{ steps.get_token.outputs.token }}
          OUTPUT_JSON_PATH: stats.json
        run: |
          python script/calculate_commit_lines.py

      # 7. 整理部署目录，只将 stats.json 推送到数据分支，保持分支干净
      - name: 准备数据部署目录
        run: |
          mkdir stats_dist
          cp stats.json stats_dist/

      # 8. 推送 stats.json 至 stats-data 分支
      - name: 推送数据至 stats-data 分支
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: stats_dist
          branch: stats-data
          token: ${{ steps.get_token.outputs.token }}
          clean: true
