<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- SEO Meta -->
  <title>校园活动 EMU-Stu</title>
  <link rel="icon" href="/assets/emu-stu-logo.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="EMU-Stu">
  <meta name="description" content="校园活动日历：篮球赛、讲座、社团例会、招聘会、志愿活动、考试安排等，按天、周、月查看应急管理大学校园里正在发生的精彩。">
  <meta name="keywords" content="应急管理大学,校园活动,活动日历,EMU-Stu,校园服务">

  <!-- Google Fonts: Hanken Grotesk + Work Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Work+Sans:wght@500;600&display=swap"
    rel="stylesheet"
  >

  <!-- Material Symbols Outlined -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet"
  >
</head>

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
  <!-- 顶部导航栏 -->
  <emu-header></emu-header>

  <!-- 主内容区 -->
  <main class="flex-grow">
    <!-- 统一的渐变背景包裹层 -->
    <div class="relative overflow-hidden neon-gradient-bg border-t border-outline-variant/10">
      <!-- 装饰性背景光晕 -->
      <div class="absolute top-[10%] left-[10%] w-[600px] h-[600px] rounded-full bg-primary/5 dark:bg-primary-fixed-dim/5 blur-3xl pointer-events-none"></div>
      <div class="absolute bottom-[10%] right-[10%] w-[600px] h-[600px] rounded-full bg-secondary-fixed-dim/5 dark:bg-tertiary-fixed-dim/5 blur-3xl pointer-events-none"></div>

      <!-- 校园活动日历组件 -->
      <emu-activity-calendar id="activity-section"></emu-activity-calendar>
    </div>
  </main>

  <!-- 页脚 -->
  <emu-footer></emu-footer>

  <!-- 彩蛋系统 -->
  <emu-easter-egg></emu-easter-egg>

  <!-- 应用入口 -->
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
